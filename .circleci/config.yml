version: 2.1

commands:
  run_build_dep_image:
    parameters:
      dep:
        type: string
      tag:
        type: string
    steps:
      - run:
          name: Build <<parameters.dep>> image
          command: |
            docker build -f docker_deps/Dockerfile_<<parameters.dep>> -t  $DOCKERHUB_USERNAME/<<parameters.dep>>:<<parameters.tag>> docker_deps
      - run:
          name: Test <<parameters.dep>> image
          command: |
            docker run --rm  $DOCKERHUB_USERNAME/<<parameters.dep>>:<<parameters.tag>> echo "Image <<parameters.dep>> built successfully"

  run_build_designer_image:
    parameters:
      tag:
        type: string
      dependency_tag:
        type: string
    steps:
      - run:
          name: Build designer image
          command: |
            docker build --build-arg DEPENDENCY_TAG=<<parameters.dependency_tag>> -t $DOCKERHUB_USERNAME/designer2:<<parameters.tag>> .
      - run:
          name: Test designer command
          command: |
            docker run -it $DOCKERHUB_USERNAME/designer2:<<parameters.tag>> designer -version
      - run:
          name: Test fsl command
          command: |
            docker run -it $DOCKERHUB_USERNAME/designer2:<<parameters.tag>> flirt -version
      - run:
          name: Test mrtrix command
          command: |
            docker run -it $DOCKERHUB_USERNAME/designer2:<<parameters.tag>> mrinfo -version

jobs:
  build-fsl:
    parameters:
      tag:
        type: string
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run_build_dep_image:
          dep: fsl
          tag: <<parameters.tag>>

  build-mrtrix:
    parameters:
      tag:
        type: string
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run_build_dep_image:
          dep: mrtrix
          tag: <<parameters.tag>>

  build-ants:
    parameters:
      tag:
        type: string
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run_build_dep_image:
          dep: ants
          tag: <<parameters.tag>>

  build-designer:
    parameters:
      tag:
        type: string
      dependency_tag:
        type: string
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run_build_designer_image:
          tag: <<parameters.tag>>
          dependency_tag: <<parameters.dependency_tag>>

  build-and-push-designer:
    parameters:
      tag:
        type: string
      dependency_tag:
        type: string
        default: latest
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run_build_designer_image:
          tag: <<parameters.tag>>
          dependency_tag: <<parameters.dependency_tag>>
      - run:
          name: push docker image
          command: |
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push $DOCKERHUB_USERNAME/designer2:<<parameters.tag>>

workflows:
  build-on-commit:
    jobs:
      - build-fsl:
          name: Build FSL on Commit
          tag: build-test
          filters:
            paths:
              only: docker_deps/Dockerfile_fsl
      - build-mrtrix:
          name: Build MRtrix on Commit
          tag: build-test
          filters:
            paths:
              only: docker_deps/Dockerfile_mrtrix3
      - build-ants:
          name: Build ANTs on Commit
          tag: build-test
          filters:
            paths:
              only: docker_deps/Dockerfile_ants
      - build-designer:
          name: Build Designer on Commit
          tag: build-test
          dependency_tag: build-test
          requires:
            - build-fsl
            - build-mrtrix
            - build-ants
          filters:
            branches:
              ignore: main
          context:
            - DockerHub

  build-and-push-when-merged-to-main:
    jobs:
      - build-and-push-designer:
          name: Deploy Main
          tag: main
          filters:
            branches:
              only: main
          context:
            - DockerHub

  build-and-push-on-tag:
    jobs:
      - build-and-push-designer:
          name: Deploy Tagged Releases
          tag: ${CIRCLE_TAG}
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
          context:
            - DockerHub
